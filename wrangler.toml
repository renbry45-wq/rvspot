# RVSpot.net — Cloudflare Worker configuration
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "rvspot"
main = "_worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "." }

# Custom domains (must already exist in Cloudflare DNS)
routes = [
  { pattern = "rvspot.net", custom_domain = true },
  { pattern = "www.rvspot.net", custom_domain = true },
]

# Cron trigger: fires every hour for the 48-hour Connect reminder emails.
# sendConnectReminders() is idempotent — safe to run frequently.
[triggers]
crons = ["0 * * * *"]
